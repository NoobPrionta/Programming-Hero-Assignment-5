<!DOCTYPE html>

    <title>Github Issue Tracker Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

    *{
        font-family: "Geist", sans-serif;

<body>
    <nav class="mb-3">
        <div class="full-div flex justify-between">
            <div class="left-nav flex items-center gap-2 mt-4 ml-5">
                <div><img src="assets/github-logo.png" alt="" class="h-8 w-8"></div>
                <div><p>Github Issues Tracker</p></div>
            </div>
            <div class="right-nav flex items-center gap-2 mr-5 mt-4">
                <div>
                    <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search issues" />
</label>
                </div>
                <div>
                    <button class="btn btn-primary items-center">+ New Issue</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- button filtering  -->
    <div class="max-w-6xl mx-auto px-4 p-2 rounded-md bg-[#c6bbbb11] shadow-sm  ">
        <button  class="btn btn-primary mr-2">All</button>
        <button class="btn btn-primary mr-2">Open</button>
        <button class="btn btn-primary">Closed</button>
    </div>

    <div class="flex justify-between max-w-6xl mx-auto px-4 p-6 bg-[#e4e4e731] mt-2 rounded-md shadow-sm ">
        <div class="left flex items-center gap-2">
            <div><img src="assets/Aperture.png" alt="" class="border rounded-full border-gray-400 p-1"></div>
            <div>
            <p class="font-semibold">50 Issues</p>
            <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
        </div>
        
        <div class="right flex gap-6 mr-4 items-center">
            <div class="items-center flex gap-2">
                <div class="flex items-center gap-1">
                    <div><span class="w-4 h-4 bg-green-500 rounded-full inline-block"></span></div>
            <div>Open</div>
                </div>
            <div class="flex items-center gap-1">
                <div><span class="w-4 h-4 bg-red-500 rounded-full inline-block"></span></div>
            <div>Close</div>
            </div>
        </div>
    </div>
    </div>
    
<!-- cart details issues  -->
