<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>

<body>
    <nav class="mb-3">
        <div class="full-div flex justify-between">
            <!-- <div class="left-nav flex items-center gap-2 mt-4 ml-5"> -->
                <div class="left-nav grid grid-cols-1 lg:flex lg:items-center gap-2 mt-4 ml-5">
                <div class="sm:flex flex-col justify-between items-center"><img src="assets/github-logo.png" alt="" class="h-8 w-8"></div>
                <div><p>Github Issues Tracker</p></div>
            </div>
            <!-- <div class="right-nav flex items-center gap-2 mr-5 mt-4"> -->
                <div class="right-nav grid grid-cols-1 lg:flex lg:items-center gap-2 mr-5 mt-4">
                <div>
                    <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="searchInput" type="search" required placeholder="Search issues" />
</label>
                </div>
                <div>
                    <button class="btn btn-primary items-center ">+ New Issue</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- button filtering  -->
    <div class="max-w-6xl mx-auto px-4 p-2 rounded-md bg-[#c6bbbb11] shadow-sm  ">
        <button id="allBtn" class="filterBtn btn bg-blue-600 text-white mr-2">All</button>
        <button id="openBtn" class="filterBtn btn bg-white text-blue-600 mr-2">Open</button>
        <button id="closedBtn" class="filterBtn btn bg-white text-blue-600">Closed</button>
    </div>

    <div class="flex justify-between max-w-6xl mx-auto px-4 p-6 bg-[#e4e4e731] mt-2 rounded-md shadow-sm ">
        <div class="left flex items-center gap-2">
            <div><img src="assets/Aperture.png" alt="" class="border rounded-full border-gray-400 p-1"></div>
            <div>
            <p id="issueCount" class="font-semibold">50 Issues</p>
            <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
        </div>
        
        <div class="right flex gap-6 mr-4 items-center">
                <div class="grid grid-cols-1 sm:flex sm:items-center gap-2">
                <div class="flex items-center gap-1">
                    <div><span class="w-4 h-4 bg-green-500 rounded-full inline-block"></span></div>
            <div>Open</div>
                </div>
            <div class="flex items-center gap-1">
                <div><span class="w-4 h-4 bg-blue-500 rounded-full inline-block"></span></div>
            <div>Close</div>
            </div>
        </div>
    </div>
    </div>
    

<!-- //Loading spinner  -->
     <div id="loader" class="text-center my-6 hidden">
    <span class="loading loading-spinner loading-xl"></span>
</div>

<!-- cart details issues  -->
    <!-- <div id="issues" class="grid grid-cols-4 gap-6 mt-4 max-w-6xl mx-auto px-4 p-2   "> -->
        <div id="issues" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-4 max-w-6xl mx-auto px-4 p-2">

<div id="date" class="text-gray-400"><p>1/15/2024</p></div>
        </div> -->


    </div>


    <div id="issueModal" class="fixed inset-0 hidden items-center justify-center bg-black/30 backdrop-blur-sm z-50">

<div class="bg-white w-[650px] rounded-xl shadow-2xl p-6 relative">

<h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>

<div class="flex items-center gap-3 text-sm text-gray-500 mb-4">
<span id="modalStatus" class="bg-green-500 text-white px-3 py-1 rounded-full text-xs"></span>
<span>Opened by <span id="modalAuthor"></span></span>
<span>•</span>
<span id="modalDate"></span>
</div>

<div id="modalLabels" class="flex gap-2 mb-4"></div>

<p id="modalDescription" class="text-gray-600 mb-6"></p>

<div class="bg-gray-100 rounded-lg p-4 flex justify-between">

<div>
<p class="text-gray-500 text-sm">Assignee:</p>
<p id="modalAssignee" class="font-semibold"></p>
</div>

<div>
<p class="text-gray-500 text-sm">Priority:</p>
<span id="modalPriority" class="px-3 py-1 rounded-full text-xs font-semibold"></span>
</div>

</div>

<div class="flex justify-end mt-6">
<button onclick="closeModal()" class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700">
Close
</button>
</div>

</div>
</div>

    
    
    
    <script src="issueTracker.js"></script>
</body>
